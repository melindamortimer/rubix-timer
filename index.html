<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubik's Timer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <div id="app-header">
      <img id="logo" src="rubix_logo.png" alt="Rubik's Cube">
      <span id="app-title">Rubik's Timer</span>
      <button class="btn-ghost" id="multiplayer-btn" title="2 Player Mode">2P</button>
    </div>
    <div id="scramble-bar">
      <div id="scramble-text"></div>
      <button class="btn-ghost" onclick="showNewScramble()" title="New scramble">&#x21BB;</button>
    </div>
    <div id="cube-panel" class="cube-panel">
      <button class="cube-toggle" id="cube-toggle" title="Toggle scramble diagram">&#x25C0;</button>
      <div class="cube-panel-inner">
        <div id="cube-scene" class="cube-scene"></div>
      </div>
    </div>

    <div id="session-bar">
      <div id="session-controls">
        <select id="session-select"></select>
        <button class="btn-ghost" id="session-add" title="New session">+</button>
        <button class="btn-ghost" id="session-rename" title="Rename session">&#x270E;</button>
        <button class="btn-ghost" id="session-delete" title="Delete session">&#x2715;</button>
      </div>
      <span id="session-today"></span>
    </div>

    <div id="timer-area">
      <div id="solo-timer">
        <div id="timer-display">0.00</div>
        <div id="vs-best"></div>
      </div>
      <div id="split-timer" style="display:none;">
        <div class="split-player split-player--you">
          <div class="split-name" id="split-name-you">You</div>
          <div class="split-display" id="split-display-you">0.00</div>
          <div class="split-status" id="split-status-you"></div>
          <div class="split-stats" id="split-stats-you"></div>
        </div>
        <div class="split-divider"></div>
        <div class="split-player split-player--opp">
          <div class="split-name" id="split-name-opp">Opponent</div>
          <div class="split-display" id="split-display-opp">0.00</div>
          <div class="split-status" id="split-status-opp"></div>
          <div class="split-stats" id="split-stats-opp"></div>
        </div>
      </div>
      <button class="btn-primary" id="new-round-btn" style="display:none;margin-top:16px;width:auto;padding:10px 32px;">New Round</button>
    </div>
    <div id="mp-history-panel" style="display:none;">
      <div id="mp-history-header"></div>
      <div id="mp-history-list"></div>
    </div>
    <div id="hint">Hold spacebar to start</div>

    <div id="stats-panel">
      <div id="speed-chart-container">
        <canvas id="speed-chart"></canvas>
      </div>
      <div id="stats-row">
        <div class="stat"><span class="stat-label">Best</span><span id="stat-best" class="stat-value">&mdash;</span></div>
        <div class="stat"><span class="stat-label">Ao3</span><span id="stat-ao3" class="stat-value">&mdash;</span></div>
        <div class="stat"><span class="stat-label">Ao5</span><span id="stat-ao5" class="stat-value">&mdash;</span></div>
        <div class="stat"><span class="stat-label">Ao12</span><span id="stat-ao12" class="stat-value">&mdash;</span></div>
      </div>
      <div id="history-header">
        <span>Solves</span>
        <div id="history-actions">
          <button class="btn-ghost btn-ghost-sm" id="export-btn" title="Export CSV">Export</button>
          <button class="btn-ghost btn-ghost-sm" id="import-btn" title="Import CSV">Import</button>
          <button class="btn-ghost btn-ghost-sm" id="clear-all-btn" title="Clear all">Clear All</button>
        </div>
      </div>
      <input type="file" id="import-file" accept=".csv" style="display: none;">
      <div id="history-list"></div>
    </div>
  </div>

  <!-- Multiplayer Modal -->
  <div id="mp-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <span>2 Player Mode</span>
        <button class="btn-ghost modal-close" id="mp-modal-close">&times;</button>
      </div>
      <div id="mp-modal-body">
        <input type="text" id="mp-name-input" class="mp-input" placeholder="Your name" maxlength="20">
        <div class="mp-actions">
          <button class="btn-primary" id="mp-create-btn">Create Room</button>
          <span class="mp-or">or</span>
          <div class="mp-join-row">
            <input type="text" id="mp-code-input" class="mp-input" placeholder="Room code" maxlength="6">
            <button class="btn-primary" id="mp-join-btn">Join</button>
          </div>
        </div>
        <div id="mp-error" class="mp-error"></div>
      </div>
      <!-- Waiting state -->
      <div id="mp-waiting" style="display:none;">
        <p>Waiting for opponent...</p>
        <div class="mp-code-display" id="mp-room-code"></div>
        <p class="mp-share-hint">Share this code or link with your friend</p>
        <button class="btn-ghost" id="mp-copy-link">Copy Link</button>
      </div>
    </div>
  </div>

  <!-- Countdown Overlay -->
  <div id="countdown-overlay" style="display:none;">
    <div id="countdown-text"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>

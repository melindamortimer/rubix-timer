<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubik's Timer</title>
  <style>
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #app-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 0 6px;
    }

    #logo {
      width: 32px;
      height: 32px;
    }

    #app-title {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #888;
      text-transform: uppercase;
    }

    #scramble-bar {
      padding: 12px 16px;
      text-align: center;
      font-family: monospace;
      font-size: 1.4rem;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #scramble-text {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2px;
    }

    .scramble-move {
      display: inline-block;
      width: 2.2ch;
      text-align: center;
    }

    #scramble-bar button {
      background: none;
      border: 1px solid #444;
      color: #888;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    #scramble-bar button:hover { color: #fff; border-color: #666; }

    #session-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 4px 16px;
      font-size: 0.85rem;
      color: #888;
    }

    #session-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #session-select {
      background: #222;
      color: #e0e0e0;
      border: 1px solid #444;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    #session-bar button {
      background: none;
      border: 1px solid #444;
      color: #888;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    #session-bar button:hover { color: #fff; border-color: #666; }

    #session-today {
      color: #666;
      font-size: 0.8rem;
    }

    #timer-area {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #timer-display {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: clamp(4rem, 15vw, 8rem);
      user-select: none;
      touch-action: none;
      cursor: pointer;
    }

    #vs-best {
      text-align: center;
      font-family: monospace;
      font-size: 1.1rem;
      min-height: 1.4em;
      margin-top: -4px;
    }

    #hint {
      color: #555;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 8px;
    }

    #speed-chart-container {
      padding: 8px 12px;
      height: 140px;
      position: relative;
    }

    #stats-panel {
      display: flex;
      flex-direction: column;
      max-height: 55vh;
      overflow: hidden;
    }

    #stats-row {
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      border-bottom: 1px solid #333;
    }

    .stat { text-align: center; }
    .stat-label { display: block; font-size: 0.75rem; color: #888; text-transform: uppercase; }
    .stat-value { display: block; font-size: 1.2rem; font-family: monospace; margin-top: 4px; }

    #history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      font-size: 0.85rem;
      color: #888;
    }

    #history-actions {
      display: flex;
      gap: 6px;
    }

    #export-btn, #import-btn {
      background: none;
      border: 1px solid #555;
      color: #888;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
    }

    #export-btn:hover, #import-btn:hover { color: #fff; border-color: #666; }

    #clear-all-btn {
      background: none;
      border: 1px solid #555;
      color: #888;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
    }

    #clear-all-btn:hover { color: #ff5252; border-color: #ff5252; }

    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
    }

    .history-row {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #222;
      font-size: 0.9rem;
    }

    .history-num { width: 40px; color: #666; }
    .history-time { width: 80px; font-family: monospace; font-weight: bold; }
    .history-scramble { flex: 1; font-family: monospace; font-size: 0.75rem; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-left: 12px; }

    .history-delta {
      width: 70px;
      font-family: monospace;
      font-size: 0.8rem;
      text-align: right;
    }
    .delta-positive { color: #ff5252; }
    .delta-negative { color: #00e676; }
    .delta-neutral { color: #888; }
    .delta-best { color: #ffd700; }

    .history-date-header {
      padding: 8px 0 4px;
      font-size: 0.75rem;
      color: #555;
      border-bottom: 1px solid #2a2a2a;
      margin-top: 4px;
    }

    .history-header-row {
      display: flex;
      align-items: center;
      padding: 4px 0;
      font-size: 0.7rem;
      color: #555;
      text-transform: uppercase;
      border-bottom: 1px solid #333;
    }

    .history-header-row span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-delete {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 8px;
    }

    .history-delete:hover { color: #ff5252; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <div id="app-header">
      <img id="logo" src="rubix_logo.png" alt="Rubik's Cube">
      <span id="app-title">Rubik's Timer</span>
    </div>
    <div id="scramble-bar">
      <div id="scramble-text"></div>
      <button onclick="showNewScramble()" title="New scramble">&#x21BB;</button>
    </div>

    <div id="session-bar">
      <div id="session-controls">
        <select id="session-select"></select>
        <button id="session-add" title="New session">+</button>
        <button id="session-rename" title="Rename session">&#x270E;</button>
        <button id="session-delete" title="Delete session">&#x2715;</button>
      </div>
      <span id="session-today"></span>
    </div>

    <div id="timer-area">
      <div id="timer-display">0.00</div>
      <div id="vs-best"></div>
    </div>
    <div id="hint">Hold spacebar to start</div>

    <div id="stats-panel">
      <div id="speed-chart-container">
        <canvas id="speed-chart"></canvas>
      </div>
      <div id="stats-row">
        <div class="stat"><span class="stat-label">Best</span><span id="stat-best" class="stat-value">&mdash;</span></div>
        <div class="stat"><span class="stat-label">Ao3</span><span id="stat-ao3" class="stat-value">&mdash;</span></div>
        <div class="stat"><span class="stat-label">Ao5</span><span id="stat-ao5" class="stat-value">&mdash;</span></div>
        <div class="stat"><span class="stat-label">Ao12</span><span id="stat-ao12" class="stat-value">&mdash;</span></div>
      </div>
      <div id="history-header">
        <span>Solves</span>
        <div id="history-actions">
          <button id="export-btn" title="Export CSV">Export</button>
          <button id="import-btn" title="Import CSV">Import</button>
          <button id="clear-all-btn" title="Clear all">Clear All</button>
        </div>
      </div>
      <input type="file" id="import-file" accept=".csv" style="display: none;">
      <div id="history-list"></div>
    </div>
  </div>

  <script>
    // === Task 2: Scramble Generator ===

    function generateScramble() {
      const faces = ['R', 'L', 'U', 'D', 'F', 'B'];
      const modifiers = ['', "'", '2'];
      const axes = { R: 0, L: 0, U: 1, D: 1, F: 2, B: 2 };
      const moves = [];
      let lastFace = '', lastAxis = -1;

      for (let i = 0; i < 20; i++) {
        let face;
        do {
          face = faces[Math.floor(Math.random() * faces.length)];
        } while (face === lastFace || (axes[face] === lastAxis && moves.length > 0));

        const mod = modifiers[Math.floor(Math.random() * modifiers.length)];
        moves.push(face + mod);
        lastAxis = axes[face];
        lastFace = face;
      }
      return moves.join(' ');
    }

    const scrambleText = document.getElementById('scramble-text');

    function showNewScramble() {
      const moves = generateScramble().split(' ');
      scrambleText.innerHTML = moves.map(m => `<span class="scramble-move">${m}</span>`).join('');
    }

    showNewScramble();

    // === Task 3: Timer State Machine ===

    let timerState = 'idle';
    let holdTimeout = null;
    let startTime = 0;
    let elapsed = 0;
    let animationFrame = null;
    let currentScramble = '';

    const timerDisplay = document.getElementById('timer-display');

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (e.repeat) return;

        if (timerState === 'running') {
          stopTimer();
        } else if (timerState === 'idle' || timerState === 'stopped') {
          startHolding();
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (timerState === 'holding') {
          cancelHolding();
        } else if (timerState === 'ready') {
          startTimer();
        }
      }
    });

    // === Task 4: Mobile Touch Support ===

    timerDisplay.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (timerState === 'running') {
        stopTimer();
      } else if (timerState === 'idle' || timerState === 'stopped') {
        startHolding();
      }
    });

    timerDisplay.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (timerState === 'holding') {
        cancelHolding();
      } else if (timerState === 'ready') {
        startTimer();
      }
    });

    function startHolding() {
      timerDisplay.textContent = '0.00';
      timerState = 'holding';
      timerDisplay.style.color = '#ffd700';
      holdTimeout = setTimeout(() => {
        timerState = 'ready';
        timerDisplay.style.color = '#00e676';
      }, 300);
    }

    function cancelHolding() {
      clearTimeout(holdTimeout);
      timerState = 'idle';
      timerDisplay.style.color = '#ffffff';
    }

    function startTimer() {
      timerState = 'running';
      timerDisplay.style.color = '#ffffff';
      currentScramble = [...scrambleText.querySelectorAll('.scramble-move')].map(el => el.textContent).join(' ');
      startTime = performance.now();
      updateDisplay();
    }

    function stopTimer() {
      timerState = 'stopped';
      elapsed = Math.round(performance.now() - startTime);
      cancelAnimationFrame(animationFrame);
      timerDisplay.textContent = formatTime(elapsed);
      timerDisplay.style.color = '#ffffff';
      showNewScramble();
      addSolve(elapsed, currentScramble);
      renderStats();
      renderSessionBar();
      const hint = document.getElementById('hint');
      if (hint) hint.style.display = 'none';
    }

    function updateDisplay() {
      if (timerState !== 'running') return;
      elapsed = performance.now() - startTime;
      timerDisplay.textContent = formatTime(elapsed);
      animationFrame = requestAnimationFrame(updateDisplay);
    }

    function formatTime(ms) {
      const totalSeconds = ms / 1000;
      if (totalSeconds < 60) {
        return totalSeconds.toFixed(2);
      }
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = (totalSeconds % 60).toFixed(2).padStart(5, '0');
      return minutes + ':' + seconds;
    }

    // === Task 5: localStorage Persistence ===

    function loadSolves() {
      try {
        const data = localStorage.getItem('rubix-timer-solves');
        return data ? JSON.parse(data) : [];
      } catch {
        return [];
      }
    }

    function saveSolves(solves) {
      localStorage.setItem('rubix-timer-solves', JSON.stringify(solves));
    }

    function addSolve(time, scramble) {
      const solves = loadSolves();
      solves.unshift({
        id: crypto.randomUUID(),
        time: Math.round(time),
        scramble: scramble,
        date: new Date().toISOString(),
        session: getActiveSession()
      });
      saveSolves(solves);
      return solves;
    }

    function deleteSolve(id) {
      const solves = loadSolves().filter(s => s.id !== id);
      saveSolves(solves);
      return solves;
    }

    function clearAllSolves() {
      saveSolves([]);
      return [];
    }

    // === Sessions ===

    function loadSessionMeta() {
      try {
        const data = localStorage.getItem('rubix-timer-sessions');
        return data ? JSON.parse(data) : { sessions: ['Default'], activeSession: 'Default' };
      } catch {
        return { sessions: ['Default'], activeSession: 'Default' };
      }
    }

    function saveSessionMeta(meta) {
      localStorage.setItem('rubix-timer-sessions', JSON.stringify(meta));
    }

    function getActiveSession() {
      return loadSessionMeta().activeSession;
    }

    function setActiveSession(name) {
      const meta = loadSessionMeta();
      meta.activeSession = name;
      saveSessionMeta(meta);
    }

    function createSession(name) {
      const meta = loadSessionMeta();
      if (!meta.sessions.includes(name)) {
        meta.sessions.push(name);
      }
      meta.activeSession = name;
      saveSessionMeta(meta);
    }

    function renameSession(oldName, newName) {
      const meta = loadSessionMeta();
      const idx = meta.sessions.indexOf(oldName);
      if (idx !== -1) meta.sessions[idx] = newName;
      if (meta.activeSession === oldName) meta.activeSession = newName;
      saveSessionMeta(meta);

      const solves = loadSolves();
      solves.forEach(s => { if (s.session === oldName) s.session = newName; });
      saveSolves(solves);
    }

    function deleteSession(name) {
      const meta = loadSessionMeta();
      meta.sessions = meta.sessions.filter(s => s !== name);
      if (meta.sessions.length === 0) meta.sessions = ['Default'];
      if (meta.activeSession === name) meta.activeSession = meta.sessions[0];
      saveSessionMeta(meta);

      const solves = loadSolves().filter(s => s.session !== name);
      saveSolves(solves);
    }

    function getSessionSolves() {
      return loadSolves().filter(s => s.session === getActiveSession());
    }

    function migrateData() {
      const solves = loadSolves();
      if (solves.length > 0 && solves[0].session === undefined) {
        solves.forEach(s => { s.session = 'Default'; });
        saveSolves(solves);
      }
      const meta = loadSessionMeta();
      saveSessionMeta(meta);
    }

    // === Task 6: Statistics Calculations ===

    function calcBest(solves) {
      if (solves.length === 0) return null;
      return solves.reduce((min, s) => s.time < min ? s.time : min, solves[0].time);
    }

    function calcAvg(solves, count) {
      if (solves.length < count) return null;
      const recent = solves.slice(0, count).map(s => s.time);
      if (count <= 3) {
        return recent.reduce((a, b) => a + b, 0) / count;
      }
      // Trimmed mean: drop best and worst
      recent.sort((a, b) => a - b);
      const trimmed = recent.slice(1, -1);
      return trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
    }

    // === Task 7: Stats + History UI Rendering ===

    function formatDateHeader(dateStr) {
      const date = new Date(dateStr);
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      const dStr = date.toISOString().slice(0, 10);
      const tStr = today.toISOString().slice(0, 10);
      const yStr = yesterday.toISOString().slice(0, 10);

      if (dStr === tStr) return 'Today';
      if (dStr === yStr) return 'Yesterday';
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatDelta(solveTime, reference) {
      if (reference === null) return null;
      const diff = solveTime - reference;
      return { text: (diff >= 0 ? '+' : '') + (diff / 1000).toFixed(2), diff };
    }

    function renderStats() {
      const solves = getSessionSolves();

      const best = calcBest(solves);
      const ao3 = calcAvg(solves, 3);
      const ao5 = calcAvg(solves, 5);
      const ao12 = calcAvg(solves, 12);
      document.getElementById('stat-best').textContent = best !== null ? formatTime(best) : '—';
      document.getElementById('stat-ao3').textContent = ao3 !== null ? formatTime(ao3) : '—';
      document.getElementById('stat-ao5').textContent = ao5 !== null ? formatTime(ao5) : '—';
      document.getElementById('stat-ao12').textContent = ao12 !== null ? formatTime(ao12) : '—';

      // vs Best under timer (compare against previous best, i.e. best before current solve)
      const vsBestEl = document.getElementById('vs-best');
      if (solves.length > 1) {
        const lastSolve = solves[0];
        const previousBest = calcBest(solves.slice(1));
        const delta = formatDelta(lastSolve.time, previousBest);
        if (delta) {
          vsBestEl.textContent = 'vs best: ' + delta.text;
          if (delta.diff < 0) { vsBestEl.style.color = '#00e676'; }
          else if (delta.diff === 0) { vsBestEl.style.color = '#ffd700'; }
          else if (delta.diff <= 500) { vsBestEl.style.color = '#00e676'; }
          else if (delta.diff >= 3000) { vsBestEl.style.color = '#ff5252'; }
          else { vsBestEl.style.color = '#888'; }
        } else {
          vsBestEl.textContent = '';
        }
      } else {
        vsBestEl.textContent = '';
      }

      renderSpeedChart(solves);

      const historyList = document.getElementById('history-list');
      historyList.innerHTML = '';

      if (solves.length > 0) {
        const header = document.createElement('div');
        header.className = 'history-header-row';

        const cols = [
          { text: '#', width: '40px' },
          { text: 'Time', width: '80px' },
          { text: 'vs Ao3', width: '70px', align: 'right' },
          { text: 'vs Ao5', width: '70px', align: 'right' },
          { text: 'Scramble', flex: true, marginLeft: '12px' },
          { text: '', width: '32px' }
        ];

        cols.forEach(col => {
          const span = document.createElement('span');
          span.textContent = col.text;
          if (col.width) span.style.width = col.width;
          if (col.flex) span.style.flex = '1';
          if (col.align) span.style.textAlign = col.align;
          if (col.marginLeft) span.style.marginLeft = col.marginLeft;
          header.appendChild(span);
        });

        historyList.appendChild(header);
      }

      let lastDateGroup = '';

      solves.forEach((solve, i) => {
        const dateGroup = solve.date.slice(0, 10);
        if (dateGroup !== lastDateGroup) {
          lastDateGroup = dateGroup;
          const dateHeader = document.createElement('div');
          dateHeader.className = 'history-date-header';
          dateHeader.textContent = formatDateHeader(solve.date);
          historyList.appendChild(dateHeader);
        }

        const row = document.createElement('div');
        row.className = 'history-row';

        const num = document.createElement('span');
        num.className = 'history-num';
        num.textContent = `${solves.length - i}.`;

        const time = document.createElement('span');
        time.className = 'history-time';
        time.textContent = formatTime(solve.time);

        const scramble = document.createElement('span');
        scramble.className = 'history-scramble';
        scramble.title = solve.scramble;
        scramble.textContent = solve.scramble;

        const del = document.createElement('button');
        del.className = 'history-delete';
        del.title = 'Delete';
        del.dataset.id = solve.id;
        del.textContent = '\u2715';

        const deltaAo3 = document.createElement('span');
        deltaAo3.className = 'history-delta';
        const ao3Delta = formatDelta(solve.time, ao3);
        if (ao3Delta) {
          deltaAo3.textContent = ao3Delta.text;
          deltaAo3.classList.add(ao3Delta.diff <= 0 ? 'delta-negative' : 'delta-positive');
        } else {
          deltaAo3.textContent = '—';
          deltaAo3.classList.add('delta-neutral');
        }

        const deltaAo5 = document.createElement('span');
        deltaAo5.className = 'history-delta';
        const ao5Delta = formatDelta(solve.time, ao5);
        if (ao5Delta) {
          deltaAo5.textContent = ao5Delta.text;
          deltaAo5.classList.add(ao5Delta.diff <= 0 ? 'delta-negative' : 'delta-positive');
        } else {
          deltaAo5.textContent = '—';
          deltaAo5.classList.add('delta-neutral');
        }

        row.append(num, time, deltaAo3, deltaAo5, scramble, del);
        historyList.appendChild(row);
      });
    }

    // === Speed Chart ===

    let speedChart = null;

    function renderSpeedChart(solves) {
      const ctx = document.getElementById('speed-chart');
      const container = document.getElementById('speed-chart-container');

      if (solves.length < 2) {
        container.style.display = 'none';
        if (speedChart) { speedChart.destroy(); speedChart = null; }
        return;
      }

      container.style.display = '';

      // Reverse so oldest is first (left to right)
      const ordered = [...solves].reverse();
      const labels = ordered.map((_, i) => i + 1);
      const data = ordered.map(s => s.time / 1000);

      if (speedChart) {
        speedChart.data.labels = labels;
        speedChart.data.datasets[0].data = data;
        speedChart.update('none');
        return;
      }

      speedChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data,
            borderColor: '#7c4dff',
            backgroundColor: 'rgba(124, 77, 255, 0.1)',
            borderWidth: 1.5,
            pointRadius: solves.length > 50 ? 0 : 2,
            pointHoverRadius: 4,
            pointBackgroundColor: '#7c4dff',
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => formatTime(ctx.parsed.y * 1000)
              }
            }
          },
          scales: {
            x: {
              display: true,
              title: { display: false },
              ticks: { color: '#555', font: { size: 10 }, maxTicksLimit: 10 },
              grid: { color: '#222' }
            },
            y: {
              display: true,
              title: { display: false },
              ticks: {
                color: '#555',
                font: { size: 10 },
                callback: (v) => formatTime(v * 1000)
              },
              grid: { color: '#222' }
            }
          },
          interaction: {
            intersect: false,
            mode: 'index'
          }
        }
      });
    }

    document.getElementById('history-list').addEventListener('click', (e) => {
      const btn = e.target.closest('.history-delete');
      if (btn) {
        deleteSolve(btn.dataset.id);
        renderStats();
      }
    });

    document.getElementById('export-btn').addEventListener('click', () => {
      const solves = getSessionSolves();
      if (solves.length === 0) {
        alert('No solves to export.');
        return;
      }

      const header = 'time_ms,scramble,date,session';
      const rows = solves.map(s =>
        `${s.time},"${s.scramble.replace(/"/g, '""')}",${s.date},${s.session}`
      );
      const csv = [header, ...rows].join('\n');

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const session = getActiveSession().replace(/[^a-zA-Z0-9]/g, '-');
      const date = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `rubix-timer-${session}-${date}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('import-btn').addEventListener('click', () => {
      document.getElementById('import-file').click();
    });

    document.getElementById('import-file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        const text = event.target.result;
        const lines = text.trim().split('\n');

        if (lines.length < 2) {
          alert('CSV file is empty or has no data rows.');
          return;
        }

        const header = lines[0].toLowerCase().trim();
        if (!header.includes('time_ms') || !header.includes('scramble')) {
          alert('Invalid CSV format. Expected columns: time_ms, scramble, date, session');
          return;
        }

        const existing = loadSolves();
        const existingKeys = new Set(existing.map(s => `${s.time}_${s.date}`));

        let imported = 0;
        const meta = loadSessionMeta();

        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;

          const fields = parseCSVLine(line);
          if (fields.length < 2) continue;

          const time = parseInt(fields[0], 10);
          const scramble = fields[1];
          const date = fields[2] || new Date().toISOString();
          const session = fields[3] || getActiveSession();

          if (isNaN(time) || time <= 0) continue;

          const key = `${time}_${date}`;
          if (existingKeys.has(key)) continue;

          existing.unshift({
            id: crypto.randomUUID(),
            time: time,
            scramble: scramble,
            date: date,
            session: session
          });

          if (!meta.sessions.includes(session)) {
            meta.sessions.push(session);
          }

          existingKeys.add(key);
          imported++;
        }

        saveSolves(existing);
        saveSessionMeta(meta);
        renderSessionBar();
        renderStats();
        alert(`Imported ${imported} solve(s).`);
      };

      reader.readAsText(file);
      e.target.value = '';
    });

    function parseCSVLine(line) {
      const fields = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"' && line[i + 1] === '"') {
            current += '"';
            i++;
          } else if (ch === '"') {
            inQuotes = false;
          } else {
            current += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ',') {
            fields.push(current);
            current = '';
          } else {
            current += ch;
          }
        }
      }
      fields.push(current);
      return fields;
    }

    document.getElementById('clear-all-btn').addEventListener('click', () => {
      if (confirm('Delete all solves in this session?')) {
        const session = getActiveSession();
        const solves = loadSolves().filter(s => s.session !== session);
        saveSolves(solves);
        renderStats();
      }
    });

    function renderSessionBar() {
      const meta = loadSessionMeta();
      const select = document.getElementById('session-select');
      select.innerHTML = '';
      meta.sessions.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        if (name === meta.activeSession) opt.selected = true;
        select.appendChild(opt);
      });

      const today = new Date().toISOString().slice(0, 10);
      const todayCount = getSessionSolves().filter(s => s.date.slice(0, 10) === today).length;
      document.getElementById('session-today').textContent = todayCount > 0 ? `Today: ${todayCount}` : '';
    }

    document.getElementById('session-select').addEventListener('change', (e) => {
      setActiveSession(e.target.value);
      renderSessionBar();
      renderStats();
      const hint = document.getElementById('hint');
      if (hint) {
        hint.style.display = getSessionSolves().length > 0 ? 'none' : '';
      }
    });

    document.getElementById('session-add').addEventListener('click', () => {
      const name = prompt('Session name:');
      if (name && name.trim()) {
        createSession(name.trim());
        renderSessionBar();
        renderStats();
        const hint = document.getElementById('hint');
        if (hint) hint.style.display = '';
      }
    });

    document.getElementById('session-rename').addEventListener('click', () => {
      const current = getActiveSession();
      const name = prompt('Rename session:', current);
      if (name && name.trim() && name.trim() !== current) {
        renameSession(current, name.trim());
        renderSessionBar();
        renderStats();
      }
    });

    document.getElementById('session-delete').addEventListener('click', () => {
      const current = getActiveSession();
      if (confirm(`Delete session "${current}" and all its solves?`)) {
        deleteSession(current);
        renderSessionBar();
        renderStats();
        const hint = document.getElementById('hint');
        if (hint) {
          hint.style.display = getSessionSolves().length > 0 ? 'none' : '';
        }
      }
    });

    migrateData();
    renderStats();
    renderSessionBar();

    if (getSessionSolves().length > 0) {
      const hint = document.getElementById('hint');
      if (hint) hint.style.display = 'none';
    }

    document.addEventListener('mouseup', (e) => {
      if (e.target.tagName === 'BUTTON') e.target.blur();
    });
  </script>
</body>
</html>

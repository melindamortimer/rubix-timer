<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubik's Timer</title>
  <style>
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #app-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 0 6px;
    }

    #logo {
      width: 32px;
      height: 32px;
    }

    #app-title {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #888;
      text-transform: uppercase;
    }

    #scramble-bar {
      padding: 12px 16px;
      text-align: center;
      font-family: monospace;
      font-size: 1.4rem;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #scramble-text {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2px;
    }

    .scramble-move {
      display: inline-block;
      width: 2.2ch;
      text-align: center;
    }

    .btn-ghost {
      background: none;
      border: 1px solid #444;
      color: #888;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .btn-ghost:hover { color: #fff; border-color: #666; }

    #session-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 4px 16px;
      font-size: 0.85rem;
      color: #888;
    }

    #session-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #session-select {
      background: #222;
      color: #e0e0e0;
      border: 1px solid #444;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .btn-ghost-sm {
      padding: 4px 10px;
      font-size: 0.75rem;
      border-color: #555;
    }

    #session-today {
      color: #666;
      font-size: 0.8rem;
    }

    #timer-area {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #timer-display {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: clamp(4rem, 15vw, 8rem);
      user-select: none;
      touch-action: none;
      cursor: pointer;
    }

    #vs-best {
      text-align: center;
      font-family: monospace;
      font-size: 1.1rem;
      min-height: 1.4em;
      margin-top: -4px;
    }

    #hint {
      color: #555;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 8px;
    }

    #speed-chart-container {
      padding: 8px 12px;
      height: 140px;
      position: relative;
    }

    #stats-panel {
      display: flex;
      flex-direction: column;
      max-height: 55vh;
      overflow: hidden;
    }

    #stats-row {
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      border-bottom: 1px solid #333;
    }

    .stat { text-align: center; }
    .stat-label { display: block; font-size: 0.75rem; color: #888; text-transform: uppercase; }
    .stat-value { display: block; font-size: 1.2rem; font-family: monospace; margin-top: 4px; }

    #history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      font-size: 0.85rem;
      color: #888;
    }

    #history-actions {
      display: flex;
      gap: 6px;
    }

    #clear-all-btn:hover { color: #ff5252; border-color: #ff5252; }

    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
    }

    .history-row {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #222;
      font-size: 0.9rem;
    }

    .history-num { width: 40px; color: #666; }
    .history-time { width: 80px; font-family: monospace; font-weight: bold; }
    .history-scramble { flex: 1; font-family: monospace; font-size: 0.75rem; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-left: 12px; }

    .history-delta {
      width: 70px;
      font-family: monospace;
      font-size: 0.8rem;
      text-align: right;
    }
    .delta-positive { color: #ff5252; }
    .delta-negative { color: #00e676; }
    .delta-neutral { color: #888; }
    .delta-best { color: #ffd700; }

    .history-date-header {
      padding: 8px 0 4px;
      font-size: 0.75rem;
      color: #555;
      border-bottom: 1px solid #2a2a2a;
      margin-top: 4px;
    }

    .history-header-row {
      display: flex;
      align-items: center;
      padding: 4px 0;
      font-size: 0.7rem;
      color: #555;
      text-transform: uppercase;
      border-bottom: 1px solid #333;
    }

    .history-header-row span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-delete {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 8px;
    }

    .history-delete:hover { color: #ff5252; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <div id="app-header">
      <img id="logo" src="rubix_logo.png" alt="Rubik's Cube">
      <span id="app-title">Rubik's Timer</span>
    </div>
    <div id="scramble-bar">
      <div id="scramble-text"></div>
      <button class="btn-ghost" onclick="showNewScramble()" title="New scramble">&#x21BB;</button>
    </div>

    <div id="session-bar">
      <div id="session-controls">
        <select id="session-select"></select>
        <button class="btn-ghost" id="session-add" title="New session">+</button>
        <button class="btn-ghost" id="session-rename" title="Rename session">&#x270E;</button>
        <button class="btn-ghost" id="session-delete" title="Delete session">&#x2715;</button>
      </div>
      <span id="session-today"></span>
    </div>

    <div id="timer-area">
      <div id="timer-display">0.00</div>
      <div id="vs-best"></div>
    </div>
    <div id="hint">Hold spacebar to start</div>

    <div id="stats-panel">
      <div id="speed-chart-container">
        <canvas id="speed-chart"></canvas>
      </div>
      <div id="stats-row">
        <div class="stat"><span class="stat-label">Best</span><span id="stat-best" class="stat-value">&mdash;</span></div>
        <div class="stat"><span class="stat-label">Ao3</span><span id="stat-ao3" class="stat-value">&mdash;</span></div>
        <div class="stat"><span class="stat-label">Ao5</span><span id="stat-ao5" class="stat-value">&mdash;</span></div>
        <div class="stat"><span class="stat-label">Ao12</span><span id="stat-ao12" class="stat-value">&mdash;</span></div>
      </div>
      <div id="history-header">
        <span>Solves</span>
        <div id="history-actions">
          <button class="btn-ghost btn-ghost-sm" id="export-btn" title="Export CSV">Export</button>
          <button class="btn-ghost btn-ghost-sm" id="import-btn" title="Import CSV">Import</button>
          <button class="btn-ghost btn-ghost-sm" id="clear-all-btn" title="Clear all">Clear All</button>
        </div>
      </div>
      <input type="file" id="import-file" accept=".csv" style="display: none;">
      <div id="history-list"></div>
    </div>
  </div>

  <script>
    // === DOM References ===

    const dom = {
      scrambleText: document.getElementById('scramble-text'),
      timerDisplay: document.getElementById('timer-display'),
      vsBest: document.getElementById('vs-best'),
      hint: document.getElementById('hint'),
      statBest: document.getElementById('stat-best'),
      statAo3: document.getElementById('stat-ao3'),
      statAo5: document.getElementById('stat-ao5'),
      statAo12: document.getElementById('stat-ao12'),
      historyList: document.getElementById('history-list'),
      sessionSelect: document.getElementById('session-select'),
      sessionToday: document.getElementById('session-today'),
      chartCanvas: document.getElementById('speed-chart'),
      chartContainer: document.getElementById('speed-chart-container'),
      importFile: document.getElementById('import-file'),
    };

    // === Formatting Helpers ===

    function formatTime(ms) {
      const totalSeconds = ms / 1000;
      if (totalSeconds < 60) {
        return totalSeconds.toFixed(2);
      }
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = (totalSeconds % 60).toFixed(2).padStart(5, '0');
      return minutes + ':' + seconds;
    }

    function formatOrDash(value) {
      return value !== null ? formatTime(value) : '\u2014';
    }

    function formatDateHeader(dateStr) {
      const date = new Date(dateStr);
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      const dStr = date.toISOString().slice(0, 10);
      const tStr = today.toISOString().slice(0, 10);
      const yStr = yesterday.toISOString().slice(0, 10);

      if (dStr === tStr) return 'Today';
      if (dStr === yStr) return 'Yesterday';
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatDelta(solveTime, reference) {
      if (reference === null) return null;
      const diff = solveTime - reference;
      return { text: (diff >= 0 ? '+' : '') + (diff / 1000).toFixed(2), diff };
    }

    // === Scramble Generator ===

    const FACES = ['R', 'L', 'U', 'D', 'F', 'B'];
    const MODIFIERS = ['', "'", '2'];
    const FACE_AXES = { R: 0, L: 0, U: 1, D: 1, F: 2, B: 2 };

    function generateScramble() {
      const moves = [];
      let lastFace = '';
      let lastAxis = -1;

      for (let i = 0; i < 20; i++) {
        let face;
        do {
          face = FACES[Math.floor(Math.random() * FACES.length)];
        } while (face === lastFace || (FACE_AXES[face] === lastAxis && moves.length > 0));

        const mod = MODIFIERS[Math.floor(Math.random() * MODIFIERS.length)];
        moves.push(face + mod);
        lastAxis = FACE_AXES[face];
        lastFace = face;
      }
      return moves;
    }

    function showNewScramble() {
      const moves = generateScramble();
      dom.scrambleText.innerHTML = moves
        .map(m => `<span class="scramble-move">${m}</span>`)
        .join('');
    }

    function getCurrentScrambleText() {
      return [...dom.scrambleText.querySelectorAll('.scramble-move')]
        .map(el => el.textContent)
        .join(' ');
    }

    // === localStorage Persistence ===

    const STORAGE_KEYS = {
      solves: 'rubix-timer-solves',
      sessions: 'rubix-timer-sessions',
    };

    const DEFAULT_SESSION_META = { sessions: ['Default'], activeSession: 'Default' };

    function loadJSON(key, fallback) {
      try {
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : fallback;
      } catch {
        return fallback;
      }
    }

    function loadSolves() {
      return loadJSON(STORAGE_KEYS.solves, []);
    }

    function saveSolves(solves) {
      localStorage.setItem(STORAGE_KEYS.solves, JSON.stringify(solves));
    }

    function addSolve(time, scramble) {
      const solves = loadSolves();
      solves.unshift({
        id: crypto.randomUUID(),
        time: Math.round(time),
        scramble,
        date: new Date().toISOString(),
        session: getActiveSession()
      });
      saveSolves(solves);
      return solves;
    }

    function deleteSolve(id) {
      const solves = loadSolves().filter(s => s.id !== id);
      saveSolves(solves);
      return solves;
    }

    // === Session Management ===

    function loadSessionMeta() {
      return loadJSON(STORAGE_KEYS.sessions, { ...DEFAULT_SESSION_META });
    }

    function saveSessionMeta(meta) {
      localStorage.setItem(STORAGE_KEYS.sessions, JSON.stringify(meta));
    }

    function getActiveSession() {
      return loadSessionMeta().activeSession;
    }

    function setActiveSession(name) {
      const meta = loadSessionMeta();
      meta.activeSession = name;
      saveSessionMeta(meta);
    }

    function createSession(name) {
      const meta = loadSessionMeta();
      if (!meta.sessions.includes(name)) {
        meta.sessions.push(name);
      }
      meta.activeSession = name;
      saveSessionMeta(meta);
    }

    function renameSession(oldName, newName) {
      const meta = loadSessionMeta();
      const idx = meta.sessions.indexOf(oldName);
      if (idx !== -1) meta.sessions[idx] = newName;
      if (meta.activeSession === oldName) meta.activeSession = newName;
      saveSessionMeta(meta);

      const solves = loadSolves();
      solves.forEach(s => { if (s.session === oldName) s.session = newName; });
      saveSolves(solves);
    }

    function deleteSession(name) {
      const meta = loadSessionMeta();
      meta.sessions = meta.sessions.filter(s => s !== name);
      if (meta.sessions.length === 0) meta.sessions = ['Default'];
      if (meta.activeSession === name) meta.activeSession = meta.sessions[0];
      saveSessionMeta(meta);

      const solves = loadSolves().filter(s => s.session !== name);
      saveSolves(solves);
    }

    function getSessionSolves() {
      return loadSolves().filter(s => s.session === getActiveSession());
    }

    function migrateData() {
      const solves = loadSolves();
      if (solves.length > 0 && solves[0].session === undefined) {
        solves.forEach(s => { s.session = 'Default'; });
        saveSolves(solves);
      }
      saveSessionMeta(loadSessionMeta());
    }

    // === Statistics ===

    function calcBest(solves) {
      if (solves.length === 0) return null;
      return solves.reduce((min, s) => s.time < min ? s.time : min, solves[0].time);
    }

    function calcAvg(solves, count) {
      if (solves.length < count) return null;
      const recent = solves.slice(0, count).map(s => s.time);
      if (count <= 3) {
        return recent.reduce((a, b) => a + b, 0) / count;
      }
      recent.sort((a, b) => a - b);
      const trimmed = recent.slice(1, -1);
      return trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
    }

    function getVsBestColor(diffMs) {
      if (diffMs <= 0) return '#00e676';
      if (diffMs <= 500) return '#00e676';
      if (diffMs >= 3000) return '#ff5252';
      return '#888';
    }

    // === UI Helpers ===

    function updateHintVisibility() {
      if (dom.hint) {
        dom.hint.style.display = getSessionSolves().length > 0 ? 'none' : '';
      }
    }

    function createDeltaElement(solveTime, reference) {
      const el = document.createElement('span');
      el.className = 'history-delta';
      const delta = formatDelta(solveTime, reference);
      if (delta) {
        el.textContent = delta.text;
        el.classList.add(delta.diff <= 0 ? 'delta-negative' : 'delta-positive');
      } else {
        el.textContent = '\u2014';
        el.classList.add('delta-neutral');
      }
      return el;
    }

    // === Stats Rendering (broken into focused functions) ===

    function updateStatValues(solves) {
      const best = calcBest(solves);
      const ao3 = calcAvg(solves, 3);
      const ao5 = calcAvg(solves, 5);
      const ao12 = calcAvg(solves, 12);

      dom.statBest.textContent = formatOrDash(best);
      dom.statAo3.textContent = formatOrDash(ao3);
      dom.statAo5.textContent = formatOrDash(ao5);
      dom.statAo12.textContent = formatOrDash(ao12);

      return { best, ao3, ao5, ao12 };
    }

    function updateVsBest(solves) {
      if (solves.length <= 1) {
        dom.vsBest.textContent = '';
        return;
      }

      const previousBest = calcBest(solves.slice(1));
      const delta = formatDelta(solves[0].time, previousBest);

      if (!delta) {
        dom.vsBest.textContent = '';
        return;
      }

      dom.vsBest.textContent = 'vs best: ' + delta.text;
      dom.vsBest.style.color = delta.diff === 0 ? '#ffd700' : getVsBestColor(delta.diff);
    }

    function renderHistoryList(solves, ao3, ao5) {
      dom.historyList.innerHTML = '';

      if (solves.length === 0) return;

      const header = document.createElement('div');
      header.className = 'history-header-row';

      const cols = [
        { text: '#', width: '40px' },
        { text: 'Time', width: '80px' },
        { text: 'vs Ao3', width: '70px', align: 'right' },
        { text: 'vs Ao5', width: '70px', align: 'right' },
        { text: 'Scramble', flex: true, marginLeft: '12px' },
        { text: '', width: '32px' }
      ];

      cols.forEach(col => {
        const span = document.createElement('span');
        span.textContent = col.text;
        if (col.width) span.style.width = col.width;
        if (col.flex) span.style.flex = '1';
        if (col.align) span.style.textAlign = col.align;
        if (col.marginLeft) span.style.marginLeft = col.marginLeft;
        header.appendChild(span);
      });

      dom.historyList.appendChild(header);

      let lastDateGroup = '';

      solves.forEach((solve, i) => {
        const dateGroup = solve.date.slice(0, 10);
        if (dateGroup !== lastDateGroup) {
          lastDateGroup = dateGroup;
          const dateHeader = document.createElement('div');
          dateHeader.className = 'history-date-header';
          dateHeader.textContent = formatDateHeader(solve.date);
          dom.historyList.appendChild(dateHeader);
        }

        const row = document.createElement('div');
        row.className = 'history-row';

        const num = document.createElement('span');
        num.className = 'history-num';
        num.textContent = `${solves.length - i}.`;

        const time = document.createElement('span');
        time.className = 'history-time';
        time.textContent = formatTime(solve.time);

        const scramble = document.createElement('span');
        scramble.className = 'history-scramble';
        scramble.title = solve.scramble;
        scramble.textContent = solve.scramble;

        const del = document.createElement('button');
        del.className = 'history-delete';
        del.title = 'Delete';
        del.dataset.id = solve.id;
        del.textContent = '\u2715';

        row.append(
          num,
          time,
          createDeltaElement(solve.time, ao3),
          createDeltaElement(solve.time, ao5),
          scramble,
          del
        );
        dom.historyList.appendChild(row);
      });
    }

    function renderStats() {
      const solves = getSessionSolves();
      const { ao3, ao5 } = updateStatValues(solves);
      updateVsBest(solves);
      renderSpeedChart(solves);
      renderHistoryList(solves, ao3, ao5);
    }

    // === Speed Chart ===

    let speedChart = null;

    function renderSpeedChart(solves) {
      if (solves.length < 2) {
        dom.chartContainer.style.display = 'none';
        if (speedChart) { speedChart.destroy(); speedChart = null; }
        return;
      }

      dom.chartContainer.style.display = '';

      const ordered = [...solves].reverse();
      const labels = ordered.map((_, i) => i + 1);
      const data = ordered.map(s => s.time / 1000);

      if (speedChart) {
        speedChart.data.labels = labels;
        speedChart.data.datasets[0].data = data;
        speedChart.update('none');
        return;
      }

      speedChart = new Chart(dom.chartCanvas, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data,
            borderColor: '#7c4dff',
            backgroundColor: 'rgba(124, 77, 255, 0.1)',
            borderWidth: 1.5,
            pointRadius: solves.length > 50 ? 0 : 2,
            pointHoverRadius: 4,
            pointBackgroundColor: '#7c4dff',
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (tip) => formatTime(tip.parsed.y * 1000)
              }
            }
          },
          scales: {
            x: {
              display: true,
              title: { display: false },
              ticks: { color: '#555', font: { size: 10 }, maxTicksLimit: 10 },
              grid: { color: '#222' }
            },
            y: {
              display: true,
              title: { display: false },
              ticks: {
                color: '#555',
                font: { size: 10 },
                callback: (v) => formatTime(v * 1000)
              },
              grid: { color: '#222' }
            }
          },
          interaction: { intersect: false, mode: 'index' }
        }
      });
    }

    // === Timer State Machine ===

    let timerState = 'idle';
    let holdTimeout = null;
    let startTime = 0;
    let elapsed = 0;
    let animationFrame = null;
    let currentScramble = '';

    function handleInputDown() {
      if (timerState === 'running') {
        stopTimer();
      } else if (timerState === 'idle' || timerState === 'stopped') {
        startHolding();
      }
    }

    function handleInputUp() {
      if (timerState === 'holding') {
        cancelHolding();
      } else if (timerState === 'ready') {
        startTimer();
      }
    }

    function startHolding() {
      dom.timerDisplay.textContent = '0.00';
      timerState = 'holding';
      dom.timerDisplay.style.color = '#ffd700';
      holdTimeout = setTimeout(() => {
        timerState = 'ready';
        dom.timerDisplay.style.color = '#00e676';
      }, 300);
    }

    function cancelHolding() {
      clearTimeout(holdTimeout);
      timerState = 'idle';
      dom.timerDisplay.style.color = '#ffffff';
    }

    function startTimer() {
      timerState = 'running';
      dom.timerDisplay.style.color = '#ffffff';
      currentScramble = getCurrentScrambleText();
      startTime = performance.now();
      updateDisplay();
    }

    function stopTimer() {
      timerState = 'stopped';
      elapsed = Math.round(performance.now() - startTime);
      cancelAnimationFrame(animationFrame);
      dom.timerDisplay.textContent = formatTime(elapsed);
      dom.timerDisplay.style.color = '#ffffff';
      showNewScramble();
      addSolve(elapsed, currentScramble);
      renderStats();
      renderSessionBar();
      if (dom.hint) dom.hint.style.display = 'none';
    }

    function updateDisplay() {
      if (timerState !== 'running') return;
      elapsed = performance.now() - startTime;
      dom.timerDisplay.textContent = formatTime(elapsed);
      animationFrame = requestAnimationFrame(updateDisplay);
    }

    // === Input Handlers (keyboard + touch) ===

    document.addEventListener('keydown', (e) => {
      if (e.code !== 'Space') return;
      e.preventDefault();
      if (!e.repeat) handleInputDown();
    });

    document.addEventListener('keyup', (e) => {
      if (e.code !== 'Space') return;
      e.preventDefault();
      handleInputUp();
    });

    dom.timerDisplay.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleInputDown();
    });

    dom.timerDisplay.addEventListener('touchend', (e) => {
      e.preventDefault();
      handleInputUp();
    });

    // === CSV Import / Export ===

    function parseCSVLine(line) {
      const fields = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"' && line[i + 1] === '"') {
            current += '"';
            i++;
          } else if (ch === '"') {
            inQuotes = false;
          } else {
            current += ch;
          }
        } else if (ch === '"') {
          inQuotes = true;
        } else if (ch === ',') {
          fields.push(current);
          current = '';
        } else {
          current += ch;
        }
      }
      fields.push(current);
      return fields;
    }

    function exportSolves() {
      const solves = getSessionSolves();
      if (solves.length === 0) {
        alert('No solves to export.');
        return;
      }

      const header = 'time_ms,scramble,date,session';
      const rows = solves.map(s =>
        `${s.time},"${s.scramble.replace(/"/g, '""')}",${s.date},${s.session}`
      );
      const csv = [header, ...rows].join('\n');

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const session = getActiveSession().replace(/[^a-zA-Z0-9]/g, '-');
      const date = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `rubix-timer-${session}-${date}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importSolves(file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        const lines = event.target.result.trim().split('\n');

        if (lines.length < 2) {
          alert('CSV file is empty or has no data rows.');
          return;
        }

        const header = lines[0].toLowerCase().trim();
        if (!header.includes('time_ms') || !header.includes('scramble')) {
          alert('Invalid CSV format. Expected columns: time_ms, scramble, date, session');
          return;
        }

        const existing = loadSolves();
        const existingKeys = new Set(existing.map(s => `${s.time}_${s.date}`));
        const meta = loadSessionMeta();
        let imported = 0;

        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;

          const fields = parseCSVLine(line);
          if (fields.length < 2) continue;

          const time = parseInt(fields[0], 10);
          if (isNaN(time) || time <= 0) continue;

          const scramble = fields[1];
          const date = fields[2] || new Date().toISOString();
          const session = fields[3] || getActiveSession();
          const key = `${time}_${date}`;

          if (existingKeys.has(key)) continue;

          existing.unshift({ id: crypto.randomUUID(), time, scramble, date, session });

          if (!meta.sessions.includes(session)) {
            meta.sessions.push(session);
          }

          existingKeys.add(key);
          imported++;
        }

        saveSolves(existing);
        saveSessionMeta(meta);
        renderSessionBar();
        renderStats();
        alert(`Imported ${imported} solve(s).`);
      };

      reader.readAsText(file);
    }

    // === Session Bar Rendering ===

    function renderSessionBar() {
      const meta = loadSessionMeta();
      dom.sessionSelect.innerHTML = '';
      meta.sessions.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        if (name === meta.activeSession) opt.selected = true;
        dom.sessionSelect.appendChild(opt);
      });

      const today = new Date().toISOString().slice(0, 10);
      const todayCount = getSessionSolves().filter(s => s.date.slice(0, 10) === today).length;
      dom.sessionToday.textContent = todayCount > 0 ? `Today: ${todayCount}` : '';
    }

    // === Event Listeners ===

    dom.historyList.addEventListener('click', (e) => {
      const btn = e.target.closest('.history-delete');
      if (btn) {
        deleteSolve(btn.dataset.id);
        renderStats();
      }
    });

    document.getElementById('export-btn').addEventListener('click', exportSolves);

    document.getElementById('import-btn').addEventListener('click', () => {
      dom.importFile.click();
    });

    dom.importFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) importSolves(file);
      e.target.value = '';
    });

    document.getElementById('clear-all-btn').addEventListener('click', () => {
      if (confirm('Delete all solves in this session?')) {
        const solves = loadSolves().filter(s => s.session !== getActiveSession());
        saveSolves(solves);
        renderStats();
      }
    });

    dom.sessionSelect.addEventListener('change', (e) => {
      setActiveSession(e.target.value);
      renderSessionBar();
      renderStats();
      updateHintVisibility();
    });

    document.getElementById('session-add').addEventListener('click', () => {
      const name = prompt('Session name:');
      if (name && name.trim()) {
        createSession(name.trim());
        renderSessionBar();
        renderStats();
        updateHintVisibility();
      }
    });

    document.getElementById('session-rename').addEventListener('click', () => {
      const current = getActiveSession();
      const name = prompt('Rename session:', current);
      if (name && name.trim() && name.trim() !== current) {
        renameSession(current, name.trim());
        renderSessionBar();
        renderStats();
      }
    });

    document.getElementById('session-delete').addEventListener('click', () => {
      const current = getActiveSession();
      if (confirm(`Delete session "${current}" and all its solves?`)) {
        deleteSession(current);
        renderSessionBar();
        renderStats();
        updateHintVisibility();
      }
    });

    document.addEventListener('mouseup', (e) => {
      if (e.target.tagName === 'BUTTON') e.target.blur();
    });

    // === Initialization ===

    migrateData();
    showNewScramble();
    renderStats();
    renderSessionBar();
    updateHintVisibility();
  </script>
</body>
</html>
